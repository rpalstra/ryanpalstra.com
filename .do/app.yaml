name: ryanpalstra
static_sites:
- build_command: rm -r ./public; hugo --destination ./public
  environment_slug: hugo
  github:
    branch: main
    deploy_on_push: true
    repo: rpalstra/ryanpalstra.com
  name: ryanpalstra
  envs:
    - key: HUGO_EXTENDED
      value: 1
    - key: HUGO_VERSION
      value: 0.158.0
