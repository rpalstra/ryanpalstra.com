---
name: ryanpalstra
static_sites:
  - build_command: rm -r ./public; hugo --destination ./public
    environment_slug: hugo
    github:
      branch: main
      deploy_on_push: true
      repo: rpalstra/ryanpalstra.com
    name: ryanpalstra
    envs:
      - key: HUGO_EXTENDED
        scope: BUILD_TIME
        value: 1
      - key: HUGO_VERSION
        scope: BUILD_TIME
        value: 0.161.1
